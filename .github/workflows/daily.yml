name: 美股每日简报

on:
  schedule:
    # 美东时间 16:30 收盘后约 30 分钟发送 (UTC 21:00, 夏令时)
    # 夏令时 (3-11月):  UTC 21:00 = 美东 17:00
    # 冬令时 (11-3月):  UTC 22:00 = 美东 17:00 (需手动调整 cron)
    - cron: '0 21 * * 1-5'   # 周一至周五 UTC 21:00
  workflow_dispatch:          # 允许手动触发（测试用）

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行报告脚本
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_SENDER:      ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:    ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER:    ${{ secrets.EMAIL_RECEIVER }}
        run: python main.py
